version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      - mlflow

  mlflow:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root /mlruns"